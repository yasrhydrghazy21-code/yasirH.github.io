<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Meta Breakout Game</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
}

canvas {
    display:block;
    margin:0 auto;
    image-rendering: pixelated;
    border:3px solid white;
    background: url('wall2.jpg') no-repeat center center;
    background-size: cover;
    max-width: 100vw;
    max-height: 100vh;
    touch-action: none;
}

#glitchCircle {
    display:none;
    position:absolute;
    width:100px;
    height:100px;
    border-radius:50%;
    background:cyan;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
    box-shadow: 0 0 20px cyan, 0 0 40px cyan inset;
}
</style>
</head>

<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="glitchCircle"></div>

<!-- Audio -->
<audio id="voice1" src="voice2/illegal.mp3"></audio>
<audio id="voice2" src="voice2/game.mp3"></audio>
<audio id="voice3" src="voice2/access.mp3"></audio>
<audio id="voice4" src="voice2/leavenow.mp3"></audio>
<audio id="bossIntro" src="voice2/myself.mp3"></audio>
<audio id="bossComment" src="voice2/tired.mp3"></audio>
<audio id="bgMusic" src="breakout.mp3" loop></audio>
<audio id="bossMusic" src="dogboss.mp3" loop></audio>
<audio id="hitSound" src="hit.mp3"></audio>
<audio id="bossHitSound" src="bark.mp3"></audio>
<audio id="shootSound" src="laser.mp3"></audio>
<audio id="glitchSound" src="voice2/again2.mp3"></audio>
<audio id="loseVoice" src="voice2/goaway.mp3"></audio>
<audio id="victory" src="voice2/broken.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Audio
const voice1 = document.getElementById("voice1");
const voice2 = document.getElementById("voice2");
const voice3 = document.getElementById("voice3");
const voice4 = document.getElementById("voice4");
const bossIntro = document.getElementById("bossIntro");
const bossComment = document.getElementById("bossComment");
const bgMusic = document.getElementById("bgMusic");
const bossMusic = document.getElementById("bossMusic");
const hitSound = document.getElementById("hitSound");
const bossHitSound = document.getElementById("bossHitSound");
const shootSound = document.getElementById("shootSound");
const glitchSound = document.getElementById("glitchSound");
const loseVoice = document.getElementById("loseVoice");
const victory = document.getElementById("victory");

// volumes
bgMusic.volume = 0.25;
bossMusic.volume = 0.35;
[voice1,voice2,voice3,voice4,bossIntro,bossComment,loseVoice,victory].forEach(v=>v.volume=1);

// game state
let gameState = "intro";
let lives = 5;

let paddle = {x:350,y:550,w:100,h:20};
let ball = {x:400,y:540,r:10,dx:4,dy:-4};

let rows=5, cols=8, bw=90, bh=20, pad=10, offT=50, offL=35;
let bricks = [];

let boss = {x:350,y:80,w:100,h:100,hits:0,shots:[]};
let bossCooldown = 0;

let bossImg = new Image();
bossImg.src = "dog_boss.png";

let aiPlayed = false;
let bossTriggered = false;
let lostOnce = false;
let bossSoundLock = false;

// bricks
function initBricks(){
    bricks=[];
    for(let c=0;c<cols;c++){
        bricks[c]=[];
        for(let r=0;r<rows;r++){
            bricks[c][r]={x:0,y:0,status:1};
        }
    }
}
initBricks();

// controls
let left=false,right=false;

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") left=true;
    if(e.key==="ArrowRight") right=true;
});

document.addEventListener("keyup", e=>{
    if(e.key==="ArrowLeft") left=false;
    if(e.key==="ArrowRight") right=false;
});

// TOUCH movement
canvas.addEventListener("touchmove",(e)=>{
    let t=e.touches[0];
    let rect=canvas.getBoundingClientRect();
    let x=t.clientX-rect.left;
    paddle.x=x-paddle.w/2;

    if(paddle.x<0) paddle.x=0;
    if(paddle.x+paddle.w>canvas.width)
        paddle.x=canvas.width-paddle.w;
});

// FIXED CLICK SYSTEM (intro + restart)
canvas.addEventListener("click", ()=>{
    if(gameState==="intro"){
        playVoices();
    }
    else if(gameState==="gameover"){
        restartGame();
    }
});

// AI voices
async function playVoices(){
    if(aiPlayed) return;
    aiPlayed=true;

    const voices=[voice1,voice2,voice3,voice4];
    for(let v of voices){
        await playAudio(v);
    }

    gameState="playing";
    bgMusic.currentTime=0;
    bgMusic.play();
}

function playAudio(audio){
    return new Promise(res=>{
        audio.currentTime=0;
        audio.play();
        audio.onended=res;
        audio.onerror=res;
    });
}

// draw
function drawPaddle(){
    ctx.fillStyle="white";
    ctx.fillRect(Math.floor(paddle.x),paddle.y,paddle.w,paddle.h);
}

function drawBall(){
    ctx.fillStyle="red";
    ctx.fillRect(ball.x-5,ball.y-5,10,10);
}

function drawBricks(){
    for(let c=0;c<cols;c++){
        for(let r=0;r<rows;r++){
            let b=bricks[c][r];
            if(b.status){
                let x=c*(bw+pad)+offL;
                let y=r*(bh+pad)+offT;
                b.x=x;b.y=y;
                ctx.fillStyle="#00ff00";
                ctx.fillRect(x,y,bw,bh);
            }
        }
    }
}

// collision bricks
function collision(){
    for(let c=0;c<cols;c++){
        for(let r=0;r<rows;r++){
            let b=bricks[c][r];
            if(b.status &&
               ball.x>b.x && ball.x<b.x+bw &&
               ball.y>b.y && ball.y<b.y+bh){

                b.status=0;
                ball.dy*=-1;

                hitSound.currentTime=0;
                hitSound.play();

                checkWin();
                return;
            }
        }
    }
}

function checkWin(){
    if(bossTriggered) return;

    for(let c=0;c<cols;c++){
        for(let r=0;r<rows;r++){
            if(bricks[c][r].status) return;
        }
    }

    bossTriggered=true;
    bgMusic.pause();
    bossMusic.currentTime=0;
    bossMusic.play();

    gameState="boss";
    bossIntro.currentTime=0;
    bossIntro.play();

    bossIntro.onended=()=>{
        bossComment.currentTime=0;
        bossComment.play();
    }
}

function loseBall(){
    lives--;
    ball.dx=0; ball.dy=0;

    if(lives<=0){
        bgMusic.pause();
        bossMusic.pause();

        if(!lostOnce){
            lostOnce=true;
            loseVoice.currentTime=0;
            loseVoice.play();
        }

        gameState="gameover";
        return;
    }

    ball.x=paddle.x+paddle.w/2;
    ball.y=paddle.y-ball.r-1;
    ball.dx=4*(Math.random()<0.5?1:-1);
    ball.dy=-4;
}

// boss draw
function drawBoss(){
    ctx.drawImage(bossImg,boss.x,boss.y,boss.w,boss.h);
}

// boss shoot
function bossShoot(){
    if(Math.random()<0.02){
        boss.shots.push({x:boss.x+50,y:boss.y+100,dy:4});
        shootSound.currentTime=0;
        shootSound.play();
    }
}

// shots
function drawShots(){
    ctx.fillStyle="yellow";

    for(let i=boss.shots.length-1;i>=0;i--){
        let s=boss.shots[i];
        s.y+=s.dy;

        ctx.fillRect(s.x,s.y,5,10);

        if(s.y>paddle.y &&
           s.x>paddle.x &&
           s.x<paddle.x+paddle.w){
            boss.shots.splice(i,1);
            loseBall();
        }

        if(s.y>canvas.height)
            boss.shots.splice(i,1);
    }
}

// GLITCH
function glitch(){
    bgMusic.pause();
    bossMusic.pause();

    glitchSound.currentTime=0;
    glitchSound.play();

    ball.dx=0;
    ball.dy=0;

    document.getElementById("glitchCircle").style.display="block";

    let shake=setInterval(()=>{
        document.body.style.transform=
        `translate(${Math.random()*20-10}px,${Math.random()*20-10}px)`;
    },50);

    document.getElementById("glitchCircle").onclick=()=>{
        clearInterval(shake);
        window.location.href="blank.html";
    };
}

// RESTART
function restartGame(){
    gameState="playing";
    lives=5;

    paddle={x:350,y:550,w:100,h:20};
    ball={x:400,y:540,r:10,dx:4,dy:-4};

    boss={x:350,y:80,w:100,h:100,hits:0,shots:[]};

    bossTriggered=false;
    aiPlayed=false;

    initBricks();

    document.getElementById("glitchCircle").style.display="none";

    bgMusic.currentTime=0;
    bgMusic.play();
}

// FIXED BOSS HIT SOUND 🔥
function playBossBark(){
    if(bossSoundLock) return;

    bossSoundLock=true;

    bossHitSound.pause();
    bossHitSound.currentTime=0;

    let p=bossHitSound.play();
    if(p) p.catch(()=>{});

    setTimeout(()=>bossSoundLock=false,100);
}

// MAIN LOOP
function draw(){
    ctx.clearRect(0,0,800,600);

    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Lives: "+lives,20,30);

    if(gameState==="intro"){
        ctx.fillText("Tap to start...",180,300);
    }

    if(gameState==="playing"){
        drawBricks();
        collision();
    }

    if(gameState==="boss"){
        drawBricks();
        drawBoss();
        drawShots();
        bossShoot();
    }

    if(gameState==="playing"||gameState==="boss"){
        drawBall();
        drawPaddle();

        ball.x+=ball.dx;
        ball.y+=ball.dy;

        if(ball.x<0||ball.x>canvas.width) ball.dx*=-1;
        if(ball.y<0) ball.dy*=-1;
        if(ball.y>canvas.height) loseBall();

        if(ball.y+ball.r>paddle.y &&
           ball.x>paddle.x &&
           ball.x<paddle.x+paddle.w){
            ball.dy*=-1;
        }

        if(left&&paddle.x>0) paddle.x-=7;
        if(right&&paddle.x+paddle.w<canvas.width) paddle.x+=7;
    }

    // BOSS HIT CHECK (FIXED SOUND)
    if(gameState==="boss" && bossCooldown<=0){
        if(ball.x>boss.x && ball.x<boss.x+boss.w &&
           ball.y>boss.y && ball.y<boss.y+boss.h){

            boss.hits++;
            bossCooldown=15;

            playBossBark(); // 🔥 FIXED

            ball.dy*=-1;

            if(boss.hits>=5){
                gameState="glitch";
                victory.currentTime=0;
                victory.play();
                glitch();
            }
        }
    }

    if(bossCooldown>0) bossCooldown--;

    if(gameState==="gameover"){
        ctx.fillStyle="red";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",260,260);

        ctx.fillStyle="white";
        ctx.font="20px Arial";
        ctx.fillText("Tap to Restart",280,320);
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
